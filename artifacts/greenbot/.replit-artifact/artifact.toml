kind = "web"
previewPath = "/"
title = "GreenBot"
version = "1.0.0"
id = "artifacts/greenbot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25848

[services.development]
run = "pnpm --filter @workspace/greenbot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/greenbot", "run", "build" ]
publicDir = "artifacts/greenbot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25848"
BASE_PATH = "/"
